name: Skill Sync

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-skill-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify SKILL.md is generated from CLAUDE.md
        run: python3 scripts/sync_skill.py --check
